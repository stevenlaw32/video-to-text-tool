<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频转文字工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-5xl">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold text-gray-800 mb-2">
                <i class="fas fa-video mr-3 text-indigo-600"></i>视频转文字工具
            </h1>
            <p class="text-gray-600">自动提取视频内容并生成结构化文档</p>
        </div>

        <div class="bg-white rounded-2xl shadow-xl p-8 mb-6">
            <div class="mb-6">
                <label class="block text-sm font-semibold text-gray-700 mb-3">
                    <i class="fas fa-upload mr-2"></i>上传视频文件
                </label>
                <div class="border-2 border-dashed border-gray-300 rounded-lg p-8 text-center hover:border-indigo-500 transition-colors cursor-pointer" id="dropZone">
                    <input type="file" id="videoInput" accept="video/*" class="hidden">
                    <i class="fas fa-cloud-upload-alt text-5xl text-gray-400 mb-3"></i>
                    <p class="text-gray-600 mb-2">点击选择或拖拽视频文件到此处</p>
                    <p class="text-sm text-gray-500">支持 MP4, AVI, MOV, MKV 等格式</p>
                </div>
                <div id="fileInfo" class="mt-3 text-sm text-gray-600 hidden"></div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">
                        <i class="fas fa-cog mr-2"></i>识别模型
                    </label>
                    <select id="modelSize" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent">
                        <option value="tiny">Tiny (最快，准确度较低)</option>
                        <option value="base" selected>Base (推荐，平衡速度和准确度)</option>
                        <option value="small">Small (较慢，准确度较高)</option>
                        <option value="medium">Medium (慢，准确度高)</option>
                        <option value="large">Large (最慢，准确度最高)</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">
                        <i class="fas fa-magic mr-2"></i>AI整理风格
                    </label>
                    <select id="aiStyle" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent">
                        <option value="tutorial" selected>教程格式 (结构化教程)</option>
                        <option value="summary">摘要格式 (简洁总结)</option>
                        <option value="notes">笔记格式 (学习笔记)</option>
                    </select>
                </div>
            </div>

            <div class="mb-6">
                <label class="flex items-center cursor-pointer">
                    <input type="checkbox" id="skipAI" class="w-4 h-4 text-indigo-600 border-gray-300 rounded focus:ring-indigo-500">
                    <span class="ml-2 text-sm text-gray-700">只转录文字，不使用AI整理</span>
                </label>
            </div>

            <button id="processBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-6 rounded-lg transition-colors disabled:bg-gray-400 disabled:cursor-not-allowed">
                <i class="fas fa-play mr-2"></i>开始处理
            </button>
        </div>

        <div id="progressSection" class="bg-white rounded-2xl shadow-xl p-8 mb-6 hidden">
            <h3 class="text-lg font-semibold text-gray-800 mb-4">
                <i class="fas fa-spinner fa-spin mr-2 text-indigo-600"></i>处理中...
            </h3>
            <div class="w-full bg-gray-200 rounded-full h-2.5">
                <div id="progressBar" class="bg-indigo-600 h-2.5 rounded-full transition-all duration-300" style="width: 0%"></div>
            </div>
            <p id="progressText" class="text-sm text-gray-600 mt-2"></p>
        </div>

        <div id="resultSection" class="hidden">
            <div class="bg-white rounded-2xl shadow-xl p-8 mb-6">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-lg font-semibold text-gray-800">
                        <i class="fas fa-file-alt mr-2 text-indigo-600"></i>转录文本
                    </h3>
                    <button onclick="downloadText('transcript')" class="text-indigo-600 hover:text-indigo-800 text-sm font-medium">
                        <i class="fas fa-download mr-1"></i>下载
                    </button>
                </div>
                <div id="transcriptResult" class="bg-gray-50 p-4 rounded-lg max-h-96 overflow-y-auto text-sm text-gray-700 whitespace-pre-wrap"></div>
            </div>

            <div id="summarySection" class="bg-white rounded-2xl shadow-xl p-8 hidden">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-lg font-semibold text-gray-800">
                        <i class="fas fa-brain mr-2 text-indigo-600"></i>AI整理结果
                    </h3>
                    <button onclick="downloadText('summary')" class="text-indigo-600 hover:text-indigo-800 text-sm font-medium">
                        <i class="fas fa-download mr-1"></i>下载
                    </button>
                </div>
                <div id="summaryResult" class="prose max-w-none bg-gray-50 p-4 rounded-lg max-h-96 overflow-y-auto"></div>
            </div>
        </div>
    </div>

    <script src="/static/js/main.js"></script>
</body>
</html>
