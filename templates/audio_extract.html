<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音频提取工具 - Video to Text</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .file-drop-zone {
            border: 2px dashed #cbd5e0;
            transition: all 0.3s ease;
        }
        .file-drop-zone.dragover {
            border-color: #4f46e5;
            background-color: #eef2ff;
        }
        .progress-bar {
            transition: width 0.3s ease;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen">
    <div class="container mx-auto px-4 py-6 max-w-6xl">
        <!-- Header -->
        <div class="mb-6">
            <div class="flex justify-between items-center">
                <h1 class="text-3xl font-bold text-gray-800">
                    <i class="fas fa-music mr-3 text-indigo-600"></i>音频提取工具
                </h1>
                <div class="flex gap-3">
                    <a href="/" class="px-4 py-2 bg-white hover:bg-gray-50 text-gray-700 rounded-lg shadow transition-colors">
                        <i class="fas fa-file-video mr-2"></i>视频转文字
                    </a>
                    <a href="/models" class="px-4 py-2 bg-white hover:bg-gray-50 text-gray-700 rounded-lg shadow transition-colors">
                        <i class="fas fa-cog mr-2"></i>模型配置
                    </a>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Left Panel: Upload & Settings -->
            <div class="lg:col-span-2 space-y-6">
                <!-- File Upload Area -->
                <div class="bg-white rounded-2xl shadow-xl p-8">
                    <h2 class="text-xl font-semibold text-gray-800 mb-4">
                        <i class="fas fa-upload mr-2 text-indigo-600"></i>选择视频文件
                    </h2>
                    
                    <div id="dropZone" class="file-drop-zone rounded-xl p-12 text-center cursor-pointer">
                        <i class="fas fa-cloud-upload-alt text-6xl text-gray-400 mb-4"></i>
                        <p class="text-lg font-medium text-gray-700 mb-2">拖拽文件到这里或点击选择</p>
                        <p class="text-sm text-gray-500">支持格式: MP4, AVI, MOV, MKV, FLV, WMV, M4V, WEBM</p>
                        <input type="file" id="fileInput" class="hidden" accept="video/*" multiple>
                    </div>
                </div>

                <!-- Settings -->
                <div class="bg-white rounded-2xl shadow-xl p-8">
                    <h2 class="text-xl font-semibold text-gray-800 mb-4">
                        <i class="fas fa-sliders-h mr-2 text-indigo-600"></i>提取设置
                    </h2>
                    
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-2">
                                <i class="fas fa-file-audio mr-1"></i>输出格式
                            </label>
                            <select id="outputFormat" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500">
                                <option value="mp3" selected>MP3</option>
                                <option value="wav">WAV</option>
                                <option value="aac">AAC</option>
                                <option value="flac">FLAC</option>
                                <option value="ogg">OGG</option>
                            </select>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-2">
                                <i class="fas fa-signal mr-1"></i>音质
                            </label>
                            <select id="bitrate" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500">
                                <option value="128k">128 kbps (标准)</option>
                                <option value="192k" selected>192 kbps (高质量)</option>
                                <option value="256k">256 kbps (极高质量)</option>
                                <option value="320k">320 kbps (无损级)</option>
                            </select>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-2">
                                <i class="fas fa-wave-square mr-1"></i>采样率
                            </label>
                            <select id="sampleRate" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500">
                                <option value="44100" selected>44.1 kHz (CD质量)</option>
                                <option value="48000">48 kHz (专业级)</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- File List -->
                <div class="bg-white rounded-2xl shadow-xl p-8">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-xl font-semibold text-gray-800">
                            <i class="fas fa-list mr-2 text-indigo-600"></i>处理队列
                            <span id="fileCount" class="text-sm text-gray-500 ml-2">(0 个文件)</span>
                        </h2>
                        <button onclick="clearAllFiles()" class="text-red-600 hover:text-red-800 text-sm font-medium">
                            <i class="fas fa-trash mr-1"></i>清空列表
                        </button>
                    </div>
                    
                    <div id="fileList" class="space-y-3 max-h-96 overflow-y-auto">
                        <div class="text-center py-8 text-gray-400">
                            <i class="fas fa-inbox text-4xl mb-2"></i>
                            <p class="text-sm">暂无文件，请上传视频</p>
                        </div>
                    </div>
                    
                    <div class="mt-6 flex gap-3">
                        <button onclick="startExtraction()" id="extractBtn" class="flex-1 px-6 py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-lg transition-colors disabled:bg-gray-400 disabled:cursor-not-allowed">
                            <i class="fas fa-play mr-2"></i>开始提取
                        </button>
                        <button onclick="downloadAll()" id="downloadAllBtn" class="px-6 py-3 bg-green-600 hover:bg-green-700 text-white font-semibold rounded-lg transition-colors disabled:bg-gray-400 disabled:cursor-not-allowed" disabled>
                            <i class="fas fa-download mr-2"></i>批量下载
                        </button>
                    </div>
                </div>
            </div>

            <!-- Right Panel: Output Files -->
            <div class="space-y-6">
                <!-- Statistics -->
                <div class="bg-white rounded-2xl shadow-xl p-6">
                    <h3 class="text-lg font-semibold text-gray-800 mb-4">
                        <i class="fas fa-chart-bar mr-2 text-indigo-600"></i>统计信息
                    </h3>
                    <div class="space-y-3">
                        <div class="flex justify-between items-center">
                            <span class="text-sm text-gray-600">总文件数</span>
                            <span id="statTotal" class="text-lg font-bold text-gray-800">0</span>
                        </div>
                        <div class="flex justify-between items-center">
                            <span class="text-sm text-gray-600">已完成</span>
                            <span id="statCompleted" class="text-lg font-bold text-green-600">0</span>
                        </div>
                        <div class="flex justify-between items-center">
                            <span class="text-sm text-gray-600">处理中</span>
                            <span id="statProcessing" class="text-lg font-bold text-blue-600">0</span>
                        </div>
                        <div class="flex justify-between items-center">
                            <span class="text-sm text-gray-600">失败</span>
                            <span id="statFailed" class="text-lg font-bold text-red-600">0</span>
                        </div>
                    </div>
                </div>

                <!-- Output Files -->
                <div class="bg-white rounded-2xl shadow-xl p-6">
                    <h3 class="text-lg font-semibold text-gray-800 mb-4">
                        <i class="fas fa-folder-open mr-2 text-indigo-600"></i>输出文件
                    </h3>
                    <div id="outputFilesList" class="space-y-2 max-h-96 overflow-y-auto">
                        <p class="text-sm text-gray-400 text-center py-4">暂无输出文件</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/audio_extract.js"></script>
</body>
</html>
