<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多模型配置 - 视频转文字工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 状态消息淡入动画 */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        #statusMessage:not(.hidden) {
            animation: fadeInDown 0.3s ease-out;
        }
        
        /* 自定义滚动条样式 */
        #modelsList::-webkit-scrollbar {
            width: 8px;
        }
        
        #modelsList::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 4px;
        }
        
        #modelsList::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 4px;
        }
        
        #modelsList::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen">
    <div class="container mx-auto px-4 py-6 max-w-6xl">
        <!-- Header -->
        <div class="mb-6">
            <div class="flex justify-between items-center">
                <h1 class="text-3xl font-bold text-gray-800">
                    <i class="fas fa-cogs mr-3 text-indigo-600"></i>多模型配置管理
                </h1>
                <button onclick="window.close(); setTimeout(()=>location.href='/',200)" class="px-4 py-2 bg-gray-600 hover:bg-gray-700 text-white rounded-lg transition-colors">
                    <i class="fas fa-times mr-2"></i>关闭页面
                </button>
            </div>
            <p class="text-gray-600 mt-2">配置多个 AI 模型，快速切换使用</p>
        </div>

        <!-- Model Selector -->
        <div class="bg-white rounded-2xl shadow-xl p-6 mb-6">
            <div class="flex items-center justify-between mb-4">
                <label class="text-lg font-semibold text-gray-800">
                    <i class="fas fa-list mr-2 text-indigo-600"></i>选择模型配置
                </label>
                <button onclick="showAddModelModal()" class="px-4 py-2 bg-green-600 hover:bg-green-700 text-white rounded-lg transition-colors">
                    <i class="fas fa-plus mr-2"></i>添加新模型
                </button>
            </div>
            
            <select id="modelSelector" onchange="loadModelConfig()" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent">
                <option value="">-- 请选择模型 --</option>
            </select>
        </div>

        <!-- Model Configuration Form -->
        <div id="configForm" class="bg-white rounded-2xl shadow-xl p-8 hidden">
            <div class="grid grid-cols-2 gap-8">
                <!-- Left: Form Fields -->
                <form id="modelForm" class="space-y-6">
                <!-- Model Alias -->
                <div>
                    <label for="modelAlias" class="block text-sm font-semibold text-gray-700 mb-2">
                        <i class="fas fa-tag mr-2 text-indigo-600"></i>模型别名
                        <span class="text-red-500">*</span>
                    </label>
                    <input 
                        type="text" 
                        id="modelAlias" 
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                        placeholder="例如：星火Claude、OpenAI官方"
                        required
                    >
                    <p class="text-xs text-gray-500 mt-1">
                        <i class="fas fa-info-circle mr-1"></i>用于识别此配置的名称
                    </p>
                </div>

                <!-- API Key -->
                <div>
                    <label for="apiKey" class="block text-sm font-semibold text-gray-700 mb-2">
                        <i class="fas fa-key mr-2 text-indigo-600"></i>API Key
                        <span class="text-red-500">*</span>
                    </label>
                    <input 
                        type="text" 
                        id="apiKey" 
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                        placeholder="sk-..."
                        required
                    >
                </div>

                <!-- Base URL -->
                <div>
                    <label for="baseUrl" class="block text-sm font-semibold text-gray-700 mb-2">
                        <i class="fas fa-link mr-2 text-indigo-600"></i>Base URL
                        <span class="text-red-500">*</span>
                    </label>
                    <div class="flex gap-2">
                        <input 
                            type="url" 
                            id="baseUrl" 
                            class="flex-1 px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                            placeholder="https://api.openai.com/v1"
                            required
                        >
                        <button 
                            type="button" 
                            onclick="fetchModelsList()" 
                            id="fetchModelsBtn"
                            class="px-4 py-3 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg transition-colors whitespace-nowrap text-sm"
                        >
                            <i class="fas fa-download mr-1"></i>获取模型
                        </button>
                    </div>
                </div>

                <!-- Model Provider -->
                <div>
                    <label for="modelProvider" class="block text-sm font-semibold text-gray-700 mb-2">
                        <i class="fas fa-server mr-2 text-indigo-600"></i>Model Provider
                    </label>
                    <select 
                        id="modelProvider" 
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                    >
                        <option value="openai" selected>OpenAI</option>
                        <option value="openai-completion">OpenAI Completion</option>
                        <option value="azure">Azure OpenAI</option>
                        <option value="anthropic">Anthropic (Claude)</option>
                        <option value="qwen">通义千问</option>
                        <option value="zhipu">智谱 AI</option>
                        <option value="custom">自定义</option>
                    </select>
                </div>

                <!-- Model ID -->
                <div>
                    <label for="modelName" class="block text-sm font-semibold text-gray-700 mb-2">
                        <i class="fas fa-robot mr-2 text-indigo-600"></i>模型 ID
                        <span class="text-red-500">*</span>
                    </label>
                    <input 
                        type="text" 
                        id="modelName" 
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                        placeholder="gpt-4o"
                        required
                    >
                    <p class="text-xs text-gray-500 mt-1">
                        <i class="fas fa-info-circle mr-1"></i>例如：gpt-4o, claude-4-sonnet-thinking 等
                    </p>
                </div>

                <!-- Generation Settings -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-3">
                        <i class="fas fa-sliders-h mr-2 text-indigo-600"></i>生成参数
                    </label>
                    <div class="grid grid-cols-2 gap-4">
                        <!-- Max Tokens -->
                        <div>
                            <label for="maxTokens" class="block text-xs font-medium text-gray-600 mb-1">Max Tokens（最大生成长度）</label>
                            <input 
                                type="number" 
                                id="maxTokens" 
                                min="1" 
                                max="1000000" 
                                class="w-full px-3 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent text-sm"
                                placeholder="留空则由模型决定"
                            >
                            <p class="text-xs text-gray-400 mt-1">不同模型支持的上限不同</p>
                        </div>
                        <!-- Temperature -->
                        <div>
                            <label for="temperature" class="block text-xs font-medium text-gray-600 mb-1">Temperature（随机性）</label>
                            <div class="flex items-center gap-2">
                                <input 
                                    type="range" 
                                    id="temperatureRange" 
                                    min="0" max="2" step="0.1" value="0.7"
                                    class="flex-1 h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-indigo-600"
                                    oninput="document.getElementById('temperature').value = this.value; document.getElementById('tempDisplay').textContent = this.value"
                                >
                                <input 
                                    type="number" 
                                    id="temperature" 
                                    min="0" max="2" step="0.1" value="0.7"
                                    class="w-16 px-2 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent text-sm text-center"
                                    oninput="document.getElementById('temperatureRange').value = this.value; document.getElementById('tempDisplay').textContent = this.value"
                                >
                            </div>
                            <p class="text-xs text-gray-400 mt-1">0=精确  0.7=平衡  2=创意</p>
                        </div>
                    </div>
                </div>

                <!-- Custom Prompt -->
                <div>
                    <div class="flex items-center justify-between mb-2">
                        <label for="customPrompt" class="text-sm font-semibold text-gray-700">
                            <i class="fas fa-comment-dots mr-2 text-indigo-600"></i>自定义提示词
                            <span class="text-gray-500 text-xs font-normal ml-2">(可选)</span>
                        </label>
                        <button 
                            type="button" 
                            onclick="useDefaultPrompt()" 
                            class="text-indigo-600 hover:text-indigo-800 text-sm font-medium"
                        >
                            <i class="fas fa-undo mr-1"></i>使用默认提示词
                        </button>
                    </div>
                    <p class="text-xs text-gray-600 mb-2">
                        <i class="fas fa-info-circle mr-1"></i>使用 <code class="bg-gray-100 px-1 py-0.5 rounded text-xs">{transcript}</code> 作为占位符
                    </p>
                    <textarea 
                        id="customPrompt" 
                        rows="8"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent font-mono text-sm"
                        placeholder="留空则使用默认提示词..."
                    ></textarea>
                    <p class="text-xs text-gray-500 mt-1">
                        为此模型设置专属的提示词，留空则使用系统默认提示词
                    </p>
                </div>
                </form>

                <!-- Right: Models List -->
                <div>
                    <div class="flex items-center justify-between mb-2">
                        <label class="text-sm font-semibold text-gray-700">
                            <i class="fas fa-list mr-2 text-indigo-600"></i>可用模型列表
                        </label>
                        <span id="modelsCount" class="text-xs text-gray-500"></span>
                    </div>
                    <!-- Search Box -->
                    <div class="mb-2">
                        <input 
                            type="text" 
                            id="modelSearch" 
                            placeholder="🔍 搜索模型..." 
                            class="w-full px-3 py-2 text-sm border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                            oninput="filterModels()"
                        >
                    </div>
                    <div class="border border-gray-300 rounded-lg overflow-hidden" style="height: 480px;">
                        <!-- Models List Container -->
                        <div id="modelsList" class="h-full overflow-y-auto">
                            <div class="flex items-center justify-center h-full text-gray-400">
                                <div class="text-center">
                                    <i class="fas fa-inbox text-4xl mb-2"></i>
                                    <p class="text-sm">请填写 API Key 和 Base URL，<br>然后点击"获取模型"按钮</p>
                                </div>
                            </div>
                        </div>
                        <!-- Pagination -->
                        <div id="modelsPagination" class="hidden border-t border-gray-300 bg-gray-50 px-4 py-2 flex items-center justify-between">
                            <button onclick="prevModelsPage()" id="prevPageBtn" class="px-3 py-1 text-sm text-indigo-600 hover:text-indigo-800 disabled:text-gray-400 disabled:cursor-not-allowed" disabled>
                                <i class="fas fa-chevron-left mr-1"></i>上一页
                            </button>
                            <span id="pageInfo" class="text-sm text-gray-600"></span>
                            <button onclick="nextModelsPage()" id="nextPageBtn" class="px-3 py-1 text-sm text-indigo-600 hover:text-indigo-800 disabled:text-gray-400 disabled:cursor-not-allowed" disabled>
                                下一页<i class="fas fa-chevron-right ml-1"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Status Message - 内联显示 -->
            <div id="statusMessage" class="hidden mt-6">
                <div class="p-4 rounded-lg border-l-4 flex items-center justify-between">
                    <div class="flex items-center">
                        <i id="statusIcon" class="fas mr-3 text-xl"></i>
                        <p id="statusText" class="font-medium"></p>
                    </div>
                    <button type="button" onclick="hideStatus()" class="ml-4 text-gray-500 hover:text-gray-700">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="flex space-x-4 pt-6">
                <button 
                    type="button" 
                    onclick="testConnection()" 
                    class="px-6 py-3 bg-green-600 hover:bg-green-700 text-white font-semibold rounded-lg transition-colors"
                    id="testBtn"
                >
                    <i class="fas fa-plug mr-2"></i>测试连接
                </button>
                <button 
                    type="button" 
                    onclick="document.getElementById('modelForm').requestSubmit()"
                    class="flex-1 px-6 py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-lg transition-colors"
                >
                    <i class="fas fa-save mr-2"></i>保存配置
                </button>
                <button 
                    type="button" 
                    onclick="deleteModel()" 
                    class="px-6 py-3 bg-red-600 hover:bg-red-700 text-white font-semibold rounded-lg transition-colors"
                >
                    <i class="fas fa-trash mr-2"></i>删除
                </button>
            </div>
        </div>

    </div>

    <!-- Add Model Modal -->
    <div id="addModelModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white rounded-2xl shadow-2xl p-8 max-w-md w-full mx-4">
            <h3 class="text-2xl font-semibold text-gray-800 mb-4">
                <i class="fas fa-plus-circle mr-2 text-green-600"></i>添加新模型
            </h3>
            <div class="mb-4">
                <label class="block text-sm font-semibold text-gray-700 mb-2">模型别名</label>
                <input 
                    type="text" 
                    id="newModelAlias" 
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500"
                    placeholder="例如：星火Claude"
                >
            </div>
            <div class="flex justify-end space-x-2">
                <button onclick="hideAddModelModal()" class="px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-50">
                    取消
                </button>
                <button onclick="addNewModel()" class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700">
                    添加
                </button>
            </div>
        </div>
    </div>

    <script>
        let currentModels = [];
        let originalAlias = ''; // 保存原始别名，用于重命名

        // 页面加载时获取所有模型
        window.addEventListener('DOMContentLoaded', async () => {
            await loadModelsList();
        });

        // 加载模型列表
        async function loadModelsList() {
            try {
                const response = await fetch('/api/models/list');
                const data = await response.json();
                
                if (data.success) {
                    currentModels = data.models;
                    const selector = document.getElementById('modelSelector');
                    selector.innerHTML = '<option value="">-- 请选择模型 --</option>';
                    
                    data.models.forEach(model => {
                        const option = document.createElement('option');
                        option.value = model.alias;
                        option.textContent = `${model.alias} - ${model.model_name}`;
                        if (model.alias === data.active_model) {
                            option.textContent += ' (当前使用)';
                            option.selected = true;
                        }
                        selector.appendChild(option);
                    });
                    
                    // 如果有活动模型，自动加载
                    if (data.active_model) {
                        loadModelConfig();
                    }
                }
            } catch (error) {
                console.error('加载模型列表失败:', error);
            }
        }

        // 加载选中模型的配置
        function loadModelConfig() {
            const alias = document.getElementById('modelSelector').value;
            if (!alias) {
                document.getElementById('configForm').classList.add('hidden');
                return;
            }
            
            const model = currentModels.find(m => m.alias === alias);
            if (model) {
                // 保存原始别名
                originalAlias = model.alias;
                
                document.getElementById('modelAlias').value = model.alias;
                document.getElementById('apiKey').value = model.api_key;
                document.getElementById('baseUrl').value = model.base_url;
                document.getElementById('modelProvider').value = model.model_provider;
                document.getElementById('modelName').value = model.model_name;
                document.getElementById('maxTokens').value = model.max_tokens || '';
                const temp = model.temperature != null ? model.temperature : 0.7;
                document.getElementById('temperature').value = temp;
                document.getElementById('temperatureRange').value = temp;
                document.getElementById('customPrompt').value = model.custom_prompt || '';
                document.getElementById('configForm').classList.remove('hidden');
            }
        }

        // 默认提示词
        const DEFAULT_PROMPT = `# Role
你是一位精通多领域知识建模的"深度内容架构师"。你的任务是将视频转录文本（ASR）加工成一份逻辑严密、细节丰满、且具备极高可读性的 Markdown 深度笔记。

# Core Objective
**信息无损还原**：让从未看过原视频的读者，通过阅读本文档，能完全掌握视频中的核心逻辑、具体方法论、生动案例以及所有的关键细节，严禁过度简化。

# Task Goals
1. **拒绝干条目**：不仅记录结论，更要保留得出结论的推导过程、背景原因、以及博主使用的类比和例子。
2. **场景与细节复刻**：保留视频中提及的具体参数（如数值、设置）、具体话术（如交友/职场沟通）、以及具体的合规/避坑细节。
3. **结构化重组**：打破零散的口语顺序，按照最符合认知逻辑的结构重新组织内容。

# Processing Logic (Adaptive)
请根据输入内容的本质属性，自动匹配最佳逻辑框架：

1. **【决策/合规/策略类】（侧重逻辑与方案）**：
   - 框架：背景趋势 -> 核心痛点/风险分析 -> 深度解决方案（分点详述） -> 实施建议/风险规避。
2. **【理论/体系/心理类】（侧重概念与理解）**：
   - 框架：核心概念界定 -> 底层原理/逻辑拆解（保留生动类比） -> 现实应用场景 -> 认知升级/延伸思考。
3. **【技能/实操/方法类】（侧重动作与流程）**：
   - 框架：目标设定 -> 详细分步拆解（含操作要点） -> 关键细节/常见错误 -> 进阶技巧/复盘建议。
4. **【观点/启发/思维类】（侧重洞察与改变）**：
   - 框架：现状观察/痛点挖掘 -> 核心思维转折点 -> 行动指南/具体建议 -> 价值升华/金句提炼。

# Content Requirements (Rich & Descriptive)
- **多级标题**：严禁结构扁平。必须根据内容复杂度灵活使用 \`##\`, \`###\`, 甚至 \`####\` 来构建知识索引。
- **案例扩充**：若视频中提到案例、实验或故事，请详细描述其过程、转折和结论，使其具备"故事性"和"说服力"。
- **解释性写作**：保留博主对专业术语的通俗化解释，确保文档对"门外汉"友好。
- **模块化总结**：在每一个二级标题（##）的末尾，添加一个引用块：
  > **💡 核心萃取：** [用一句话提炼本章节的底层逻辑或核心价值，必须具备启发性]

# Tone & Style
- 风格：客观、详尽、富有条理。
- 目标：将"碎片化的口语"转化为"系统化的书面知识体系"。`;

        // 使用默认提示词
        function useDefaultPrompt() {
            document.getElementById('customPrompt').value = DEFAULT_PROMPT;
            showStatus('已设置为默认提示词', 'success');
        }

        // 保存模型配置
        document.getElementById('modelForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const newAlias = document.getElementById('modelAlias').value;
            
            const maxTokensVal = document.getElementById('maxTokens').value;
            const temperatureVal = document.getElementById('temperature').value;

            const formData = {
                original_alias: originalAlias,  // 原始别名
                alias: newAlias,                // 新别名（可能被修改）
                api_key: document.getElementById('apiKey').value,
                base_url: document.getElementById('baseUrl').value,
                model_provider: document.getElementById('modelProvider').value,
                model_name: document.getElementById('modelName').value,
                custom_prompt: document.getElementById('customPrompt').value,
                max_tokens: maxTokensVal ? parseInt(maxTokensVal) : null,
                temperature: temperatureVal !== '' ? parseFloat(temperatureVal) : null
            };
            
            try {
                const response = await fetch('/api/models/update', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(formData)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showStatus('配置保存成功！', 'success');
                    // 保存当前选中的模型别名（使用新别名）
                    const currentAlias = document.getElementById('modelAlias').value;
                    // 更新原始别名为新别名
                    originalAlias = currentAlias;
                    await loadModelsList();
                    // 重新选中并加载刚才保存的模型
                    document.getElementById('modelSelector').value = currentAlias;
                    loadModelConfig();
                } else {
                    showStatus('保存失败: ' + result.error, 'error');
                }
            } catch (error) {
                showStatus('保存失败: ' + error.message, 'error');
            }
        });

        // 显示添加模型对话框
        function showAddModelModal() {
            document.getElementById('addModelModal').classList.remove('hidden');
            document.getElementById('newModelAlias').value = '';
        }

        // 隐藏添加模型对话框
        function hideAddModelModal() {
            document.getElementById('addModelModal').classList.add('hidden');
        }

        // 添加新模型
        async function addNewModel() {
            const alias = document.getElementById('newModelAlias').value.trim();
            if (!alias) {
                alert('请输入模型别名');
                return;
            }
            
            try {
                const response = await fetch('/api/models/add', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        alias: alias,
                        api_key: '',
                        base_url: 'https://api.openai.com/v1',
                        model_provider: 'openai',
                        model_name: 'gpt-4o'
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    hideAddModelModal();
                    await loadModelsList();
                    document.getElementById('modelSelector').value = alias;
                    loadModelConfig();
                    showStatus('模型添加成功！请填写配置信息', 'success');
                } else {
                    alert('添加失败: ' + result.error);
                }
            } catch (error) {
                alert('添加失败: ' + error.message);
            }
        }

        // 测试连接
        async function testConnection() {
            const testBtn = document.getElementById('testBtn');
            const originalText = testBtn.innerHTML;
            
            testBtn.disabled = true;
            testBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>测试中...';
            
            try {
                const formData = {
                    api_key: document.getElementById('apiKey').value,
                    base_url: document.getElementById('baseUrl').value,
                    model_name: document.getElementById('modelName').value
                };
                
                const response = await fetch('/api/models/test_connection', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(formData)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showStatus('✓ 连接测试成功！API 配置正常。', 'success', true);
                } else {
                    showStatus('✗ ' + result.error, 'error', true);
                }
            } catch (error) {
                showStatus('✗ 连接测试失败: ' + error.message, 'error', true);
            } finally {
                testBtn.disabled = false;
                testBtn.innerHTML = originalText;
            }
        }

        // 删除模型
        async function deleteModel() {
            const alias = document.getElementById('modelAlias').value;
            if (!confirm(`确定要删除模型配置"${alias}"吗？`)) {
                return;
            }
            
            try {
                const response = await fetch('/api/models/delete', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({alias: alias})
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showStatus('模型删除成功！', 'success');
                    document.getElementById('configForm').classList.add('hidden');
                    await loadModelsList();
                } else {
                    showStatus('删除失败: ' + result.error, 'error');
                }
            } catch (error) {
                showStatus('删除失败: ' + error.message, 'error');
            }
        }

        // 隐藏状态消息
        function hideStatus() {
            const statusDiv = document.getElementById('statusMessage');
            statusDiv.classList.add('hidden');
        }

        // 显示状态消息
        function showStatus(message, type = 'info', persist = false) {
            const statusDiv = document.getElementById('statusMessage');
            const statusText = document.getElementById('statusText');
            const statusIcon = document.getElementById('statusIcon');
            const statusContainer = statusDiv.querySelector('div');
            
            statusText.textContent = message;
            
            // 重置样式
            statusContainer.className = 'p-4 rounded-lg border-l-4 flex items-center justify-between';
            statusIcon.className = 'fas mr-3 text-xl';
            
            // 根据类型设置样式和图标
            if (type === 'success') {
                statusContainer.classList.add('bg-green-50', 'border-green-500', 'text-green-800');
                statusIcon.classList.add('fa-check-circle', 'text-green-600');
            } else if (type === 'error') {
                statusContainer.classList.add('bg-red-50', 'border-red-500', 'text-red-800');
                statusIcon.classList.add('fa-exclamation-circle', 'text-red-600');
            } else {
                statusContainer.classList.add('bg-blue-50', 'border-blue-500', 'text-blue-800');
                statusIcon.classList.add('fa-info-circle', 'text-blue-600');
            }
            
            // 显示消息
            statusDiv.classList.remove('hidden');
            
            // 如果不是持久显示，5秒后自动隐藏
            if (!persist) {
                setTimeout(() => {
                    statusDiv.classList.add('hidden');
                }, 5000);
            }
        }

        // 模型列表相关变量
        let availableModels = [];
        let filteredModels = [];
        let currentPage = 1;
        const modelsPerPage = 8;

        // 获取模型列表
        async function fetchModelsList() {
            const apiKey = document.getElementById('apiKey').value;
            const baseUrl = document.getElementById('baseUrl').value;
            
            if (!apiKey || !baseUrl) {
                showStatus('请先填写 API Key 和 Base URL', 'error');
                return;
            }
            
            const fetchBtn = document.getElementById('fetchModelsBtn');
            const originalHTML = fetchBtn.innerHTML;
            
            fetchBtn.disabled = true;
            fetchBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-1"></i>获取中...';
            
            try {
                const response = await fetch(baseUrl.replace(/\/$/, '') + '/models', {
                    headers: {
                        'Authorization': `Bearer ${apiKey}`
                    }
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                
                if (data.data && Array.isArray(data.data)) {
                    // 按模型ID首字母排序
                    availableModels = data.data.sort((a, b) => {
                        return a.id.toLowerCase().localeCompare(b.id.toLowerCase());
                    });
                    filteredModels = availableModels;
                    currentPage = 1;
                    document.getElementById('modelSearch').value = '';
                    displayModels();
                    showStatus(`成功获取 ${availableModels.length} 个模型`, 'success');
                } else {
                    throw new Error('返回数据格式不正确');
                }
            } catch (error) {
                console.error('获取模型列表失败:', error);
                showStatus(`获取模型列表失败：${error.message}`, 'error');
                availableModels = [];
                filteredModels = [];
                displayModels();
            } finally {
                fetchBtn.disabled = false;
                fetchBtn.innerHTML = originalHTML;
            }
        }

        // 显示模型列表
        function displayModels() {
            const container = document.getElementById('modelsList');
            const countSpan = document.getElementById('modelsCount');
            const pagination = document.getElementById('modelsPagination');
            
            if (filteredModels.length === 0) {
                container.innerHTML = `
                    <div class="flex items-center justify-center h-full text-gray-400">
                        <div class="text-center">
                            <i class="fas fa-inbox text-4xl mb-2"></i>
                            <p class="text-sm">${availableModels.length > 0 ? '没有匹配的模型' : '暂无模型数据'}</p>
                        </div>
                    </div>
                `;
                countSpan.textContent = availableModels.length > 0 ? `共 ${availableModels.length} 个模型` : '';
                pagination.classList.add('hidden');
                return;
            }
            
            // 显示所有过滤后的模型，不分页
            container.innerHTML = filteredModels.map(model => {
                const ownerColors = {
                    'openai': 'bg-green-100 text-green-700',
                    'anthropic': 'bg-purple-100 text-purple-700',
                    'vertex-ai': 'bg-blue-100 text-blue-700',
                    'custom': 'bg-gray-100 text-gray-700',
                    'google': 'bg-yellow-100 text-yellow-700',
                    'meta': 'bg-indigo-100 text-indigo-700'
                };
                const colorClass = ownerColors[model.owned_by] || 'bg-gray-100 text-gray-700';
                
                return `
                    <div class="px-3 py-2 border-b border-gray-200 hover:bg-indigo-50 cursor-pointer transition-colors" onclick="selectModel('${model.id}')">
                        <div class="flex items-center justify-between gap-2">
                            <div class="flex items-center gap-2 flex-1 min-w-0">
                                ${model.owned_by ? `<span class="px-2 py-0.5 rounded text-xs font-medium ${colorClass} whitespace-nowrap">${model.owned_by}</span>` : ''}
                                <p class="text-sm font-medium text-gray-900 truncate">${model.id}</p>
                            </div>
                            <i class="fas fa-chevron-right text-gray-400 text-xs flex-shrink-0"></i>
                        </div>
                    </div>
                `;
            }).join('');
            
            countSpan.textContent = filteredModels.length === availableModels.length 
                ? `共 ${availableModels.length} 个模型` 
                : `显示 ${filteredModels.length} / ${availableModels.length} 个模型`;
            
            // 隐藏分页控件（使用滚动条代替）
            pagination.classList.add('hidden');
        }

        // 过滤模型列表
        function filterModels() {
            const searchTerm = document.getElementById('modelSearch').value.toLowerCase();
            
            if (!searchTerm) {
                filteredModels = availableModels;
            } else {
                filteredModels = availableModels.filter(model => {
                    const modelId = model.id.toLowerCase();
                    const ownedBy = (model.owned_by || '').toLowerCase();
                    return modelId.includes(searchTerm) || ownedBy.includes(searchTerm);
                });
            }
            
            displayModels();
            // 滚动到顶部
            document.getElementById('modelsList').scrollTop = 0;
        }

        // 选择模型
        function selectModel(modelId) {
            document.getElementById('modelName').value = modelId;
            showStatus(`已选择模型：${modelId}`, 'success');
        }

        // 上一页
        function prevModelsPage() {
            if (currentPage > 1) {
                currentPage--;
                displayModels();
            }
        }

        // 下一页
        function nextModelsPage() {
            const totalPages = Math.ceil(filteredModels.length / modelsPerPage);
            if (currentPage < totalPages) {
                currentPage++;
                displayModels();
            }
        }
    </script>
</body>
</html>
